<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ASCII Node Graph</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/litegraph.js@0.7.18/css/litegraph.css">
  <script src="https://cdn.jsdelivr.net/npm/litegraph.js@0.7.18/build/litegraph.min.js"></script>
  <style>
    :root {
      --bg: #0f1117;
      --panel: #191c25;
      --panel-2: #222736;
      --border: #30374a;
      --text: #e8ebf1;
      --muted: #9da7bf;
      --accent: #66a3ff;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
    }
    #app {
      height: 100%;
      display: flex;
      flex-direction: column;
    }
    #topbar {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.6rem 0.8rem;
      border-bottom: 1px solid var(--border);
      background: var(--panel);
      flex-wrap: wrap;
    }
    #title {
      font-weight: 700;
      margin-right: 0.8rem;
    }
    button {
      background: var(--panel-2);
      color: var(--text);
      border: 1px solid var(--border);
      padding: 0.25rem 0.55rem;
      font: inherit;
      cursor: pointer;
      border-radius: 4px;
    }
    button:hover { border-color: var(--accent); }
    #hint {
      color: var(--muted);
      font-size: 12px;
      margin-left: 0.6rem;
    }
    #legacy-link {
      margin-left: auto;
      color: var(--muted);
      font-size: 12px;
      text-decoration: none;
    }
    #legacy-link:hover { color: var(--text); }
    #canvas-wrap {
      position: relative;
      flex: 1;
      min-height: 0;
      background: #11141b;
    }
    #graph {
      width: 100%;
      height: 100%;
      display: block;
      cursor: default;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="topbar">
      <div id="title">ASCII Node Graph</div>
      <button type="button" data-add-node="ascii/image">Image</button>
      <button type="button" data-add-node="ascii/look">Look</button>
      <button type="button" data-add-node="ascii/centercrop">CenterCrop</button>
      <button type="button" data-add-node="ascii/text">Text</button>
      <button type="button" data-add-node="ascii/greyscale">Greyscale</button>
      <button type="button" data-add-node="ascii/threshold">Threshold</button>
      <button type="button" data-add-node="ascii/canny">Canny-Edge</button>
      <button type="button" id="btn-reset-view">Reset View</button>
      <span id="hint">Drop an image anywhere on the graph to load it into the first Image node.</span>
      <a id="legacy-link" href="old_index.html">deprecated old tabs</a>
    </div>
    <div id="canvas-wrap">
      <canvas id="graph"></canvas>
    </div>
  </div>

  <script>
    (function () {
      function makeCanvas(w, h) {
        var c = document.createElement("canvas");
        c.width = w;
        c.height = h;
        return c;
      }

      function canvasFromElement(el) {
        var c = makeCanvas(el.naturalWidth || el.width, el.naturalHeight || el.height);
        c.getContext("2d").drawImage(el, 0, 0);
        return c;
      }

      function cloneCanvas(src) {
        var c = makeCanvas(src.width, src.height);
        c.getContext("2d").drawImage(src, 0, 0);
        return c;
      }

      function toGreyscaleCanvas(src) {
        var out = cloneCanvas(src);
        var ctx = out.getContext("2d");
        var img = ctx.getImageData(0, 0, out.width, out.height);
        var d = img.data;
        for (var i = 0; i < d.length; i += 4) {
          var g = Math.round(0.299 * d[i] + 0.587 * d[i + 1] + 0.114 * d[i + 2]);
          d[i] = g;
          d[i + 1] = g;
          d[i + 2] = g;
        }
        ctx.putImageData(img, 0, 0);
        out._mode = "gray";
        return out;
      }

      function thresholdCanvas(gray, threshold) {
        var out = cloneCanvas(gray);
        var ctx = out.getContext("2d");
        var img = ctx.getImageData(0, 0, out.width, out.height);
        var d = img.data;
        for (var i = 0; i < d.length; i += 4) {
          var v = d[i] < threshold ? 0 : 255;
          d[i] = v;
          d[i + 1] = v;
          d[i + 2] = v;
        }
        ctx.putImageData(img, 0, 0);
        out._mode = "binary";
        return out;
      }

      function drawPreview(ctx, preview, w, h) {
        if (!preview) return;
        var pad = 6;
        var maxW = Math.max(1, w - pad * 2);
        var maxH = Math.max(1, h - pad * 2);
        var s = Math.min(maxW / preview.width, maxH / preview.height);
        var dw = Math.max(1, Math.floor(preview.width * s));
        var dh = Math.max(1, Math.floor(preview.height * s));
        var dx = Math.floor((w - dw) / 2);
        var dy = Math.floor((h - dh) / 2);
        ctx.drawImage(preview, dx, dy, dw, dh);
      }

      function cannyFallback(srcCanvas, low, high) {
        var gray = toGreyscaleCanvas(srcCanvas);
        var w = gray.width;
        var h = gray.height;
        var gctx = gray.getContext("2d");
        var gimg = gctx.getImageData(0, 0, w, h);
        var d = gimg.data;
        var out = makeCanvas(w, h);
        var octx = out.getContext("2d");
        var oimg = octx.createImageData(w, h);
        var od = oimg.data;

        function p(x, y) {
          return d[(y * w + x) * 4];
        }

        for (var y = 1; y < h - 1; y++) {
          for (var x = 1; x < w - 1; x++) {
            var gx =
              -p(x - 1, y - 1) + p(x + 1, y - 1) +
              -2 * p(x - 1, y) + 2 * p(x + 1, y) +
              -p(x - 1, y + 1) + p(x + 1, y + 1);
            var gy =
              -p(x - 1, y - 1) - 2 * p(x, y - 1) - p(x + 1, y - 1) +
              p(x - 1, y + 1) + 2 * p(x, y + 1) + p(x + 1, y + 1);
            var mag = Math.sqrt(gx * gx + gy * gy);
            var v = mag >= high ? 255 : (mag >= low ? 130 : 0);
            var idx = (y * w + x) * 4;
            od[idx] = v;
            od[idx + 1] = v;
            od[idx + 2] = v;
            od[idx + 3] = 255;
          }
        }
        octx.putImageData(oimg, 0, 0);
        out._mode = "edge";
        return out;
      }

      function runCanny(srcCanvas, low, high) {
        if (window.cv && cv.Mat) {
          var src = cv.imread(srcCanvas);
          var gray = new cv.Mat();
          var edges = new cv.Mat();
          cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY);
          cv.Canny(gray, edges, low, high);
          var out = makeCanvas(srcCanvas.width, srcCanvas.height);
          cv.imshow(out, edges);
          src.delete();
          gray.delete();
          edges.delete();
          out._mode = "edge";
          return out;
        }
        return cannyFallback(srcCanvas, low, high);
      }

      function ImageNode() {
        this.title = "Image";
        this.size = [210, 160];
        this.addOutput("image", "image");
        this.preview = null;
        this.fileName = "";
        this.addWidget("button", "load image", null, this.pickFile.bind(this));
      }
      ImageNode.title = "Image";
      ImageNode.prototype.pickFile = function () {
        var input = document.createElement("input");
        input.type = "file";
        input.accept = "image/png,image/*";
        var self = this;
        input.onchange = function () {
          if (input.files && input.files[0]) self.loadFromFile(input.files[0]);
        };
        input.click();
      };
      ImageNode.prototype.loadFromFile = function (file) {
        var self = this;
        var fr = new FileReader();
        fr.onload = function () {
          var img = new Image();
          img.onload = function () {
            self.preview = canvasFromElement(img);
            self.fileName = file.name;
            self.setDirtyCanvas(true, true);
          };
          img.src = fr.result;
        };
        fr.readAsDataURL(file);
      };
      ImageNode.prototype.onExecute = function () {
        this.setOutputData(0, this.preview);
      };
      ImageNode.prototype.onDrawBackground = function (ctx) {
        if (!this.preview || this.flags.collapsed) return;
        drawPreview(ctx, this.preview, this.size[0], this.size[1] - 28);
      };
      ImageNode.prototype.onDrawForeground = function (ctx) {
        if (!this.fileName || this.flags.collapsed) return;
        ctx.fillStyle = "#d9d9d9";
        ctx.font = "10px monospace";
        ctx.fillText(this.fileName.slice(0, 28), 6, this.size[1] - 8);
      };

      function LookNode() {
        this.title = "Look";
        this.size = [240, 180];
        this.addInput("in", 0);
        this.preview = null;
        this.previewText = "";
      }
      LookNode.title = "Look";
      LookNode.prototype.onExecute = function () {
        var data = this.getInputData(0);
        this.preview = null;
        this.previewText = "";
        if (!data) return;
        if (typeof data === "string") this.previewText = data;
        else if (data instanceof HTMLCanvasElement) this.preview = data;
      };
      LookNode.prototype.onDrawBackground = function (ctx) {
        if (this.flags.collapsed) return;
        if (this.preview) {
          drawPreview(ctx, this.preview, this.size[0], this.size[1] - 20);
          return;
        }
        if (this.previewText) {
          ctx.fillStyle = "#ddd";
          ctx.font = "10px monospace";
          var lines = this.previewText.split("\n").slice(0, 8);
          for (var i = 0; i < lines.length; i++) {
            ctx.fillText(lines[i].slice(0, 32), 8, 26 + i * 12);
          }
        }
      };

      function CenterCropNode() {
        this.title = "CenterCrop";
        this.size = [220, 100];
        this.addInput("image", "image");
        this.addOutput("image", "image");
        this.cellW = 7;
        this.cellH = 15;
        this.addWidget("number", "cell width", this.cellW, function (v) { this.cellW = Math.max(1, Math.floor(v)); }.bind(this), { step: 1, min: 1 });
        this.addWidget("number", "cell height", this.cellH, function (v) { this.cellH = Math.max(1, Math.floor(v)); }.bind(this), { step: 1, min: 1 });
      }
      CenterCropNode.title = "CenterCrop";
      CenterCropNode.prototype.onExecute = function () {
        var src = this.getInputData(0);
        if (!(src instanceof HTMLCanvasElement)) return this.setOutputData(0, null);
        var cw = Math.max(1, this.cellW | 0);
        var ch = Math.max(1, this.cellH | 0);
        var outW = Math.max(cw, Math.floor(src.width / cw) * cw);
        var outH = Math.max(ch, Math.floor(src.height / ch) * ch);
        var sx = Math.floor((src.width - outW) / 2);
        var sy = Math.floor((src.height - outH) / 2);
        var out = makeCanvas(outW, outH);
        out.getContext("2d").drawImage(src, sx, sy, outW, outH, 0, 0, outW, outH);
        this.setOutputData(0, out);
      };

      function TextNode() {
        this.title = "Text";
        this.size = [240, 115];
        this.addOutput("text", "text");
        this.value = "";
        this.addWidget("text", "value", this.value, function (v) { this.value = String(v || ""); }.bind(this));
      }
      TextNode.title = "Text";
      TextNode.prototype.onExecute = function () { this.setOutputData(0, this.value); };

      function GreyscaleNode() {
        this.title = "Greyscale";
        this.size = [170, 70];
        this.addInput("rgb image", "image");
        this.addOutput("gray image", "image");
      }
      GreyscaleNode.title = "Greyscale";
      GreyscaleNode.prototype.onExecute = function () {
        var src = this.getInputData(0);
        this.setOutputData(0, src instanceof HTMLCanvasElement ? toGreyscaleCanvas(src) : null);
      };

      function ThresholdNode() {
        this.title = "Threshold";
        this.size = [230, 95];
        this.addInput("gray image", "image");
        this.addOutput("binary image", "image");
        this.threshold = 128;
        this.addWidget("slider", "threshold", this.threshold, function (v) {
          this.threshold = Math.max(0, Math.min(255, Math.round(v)));
        }.bind(this), { min: 0, max: 255, step: 1 });
      }
      ThresholdNode.title = "Threshold";
      ThresholdNode.prototype.onExecute = function () {
        var src = this.getInputData(0);
        if (!(src instanceof HTMLCanvasElement)) return this.setOutputData(0, null);
        if (src._mode && src._mode !== "gray") return this.setOutputData(0, null);
        this.setOutputData(0, thresholdCanvas(src, this.threshold));
      };

      function CannyNode() {
        this.title = "Canny-Edge";
        this.size = [230, 110];
        this.addInput("image", "image");
        this.addOutput("edges", "image");
        this.low = 80;
        this.high = 160;
        this.addWidget("slider", "low", this.low, function (v) { this.low = Math.max(0, Math.min(255, Math.round(v))); }.bind(this), { min: 0, max: 255, step: 1 });
        this.addWidget("slider", "high", this.high, function (v) { this.high = Math.max(0, Math.min(255, Math.round(v))); }.bind(this), { min: 0, max: 255, step: 1 });
      }
      CannyNode.title = "Canny-Edge";
      CannyNode.prototype.onExecute = function () {
        var src = this.getInputData(0);
        if (!(src instanceof HTMLCanvasElement)) return this.setOutputData(0, null);
        var low = Math.min(this.low, this.high);
        var high = Math.max(this.low, this.high);
        this.setOutputData(0, runCanny(src, low, high));
      };

      LiteGraph.registerNodeType("ascii/image", ImageNode);
      LiteGraph.registerNodeType("ascii/look", LookNode);
      LiteGraph.registerNodeType("ascii/centercrop", CenterCropNode);
      LiteGraph.registerNodeType("ascii/text", TextNode);
      LiteGraph.registerNodeType("ascii/greyscale", GreyscaleNode);
      LiteGraph.registerNodeType("ascii/threshold", ThresholdNode);
      LiteGraph.registerNodeType("ascii/canny", CannyNode);

      var graph = new LGraph();
      var graphCanvasEl = document.getElementById("graph");
      var graphCanvas = new LGraphCanvas(graphCanvasEl, graph);
      var wrap = document.getElementById("canvas-wrap");

      function resizeCanvasToContainer() {
        graphCanvasEl.width = wrap.clientWidth;
        graphCanvasEl.height = wrap.clientHeight;
        graphCanvas.resize();
      }
      window.addEventListener("resize", resizeCanvasToContainer);
      resizeCanvasToContainer();

      graphCanvas.ds.scale = 0.75;
      graphCanvas.ds.offset = [70, 60];
      graphCanvas.setDirty(true, true);
      graph.start();

      function addNode(type, x, y) {
        var node = LiteGraph.createNode(type);
        if (!node) return null;
        node.pos = [x || 90, y || 90];
        graph.add(node);
        return node;
      }

      function firstImageNode() {
        var nodes = graph._nodes || [];
        for (var i = 0; i < nodes.length; i++) {
          if (nodes[i] instanceof ImageNode) return nodes[i];
        }
        return null;
      }

      document.querySelectorAll("[data-add-node]").forEach(function (btn) {
        btn.addEventListener("click", function () {
          addNode(btn.getAttribute("data-add-node"), 140 + Math.random() * 200, 100 + Math.random() * 180);
        });
      });

      document.getElementById("btn-reset-view").addEventListener("click", function () {
        graphCanvas.ds.scale = 0.75;
        graphCanvas.ds.offset = [70, 60];
        graphCanvas.setDirty(true, true);
      });

      var img = addNode("ascii/image", 80, 110);
      var crop = addNode("ascii/centercrop", 330, 110);
      var gray = addNode("ascii/greyscale", 590, 110);
      var thr = addNode("ascii/threshold", 800, 110);
      var look = addNode("ascii/look", 1080, 110);
      if (img && crop && gray && thr && look) {
        img.connect(0, crop, 0);
        crop.connect(0, gray, 0);
        gray.connect(0, thr, 0);
        thr.connect(0, look, 0);
      }

      wrap.addEventListener("dragover", function (e) { e.preventDefault(); });
      wrap.addEventListener("drop", function (e) {
        e.preventDefault();
        var file = e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files[0];
        if (!file || !file.type || file.type.indexOf("image/") !== 0) return;
        var node = firstImageNode() || addNode("ascii/image", 80, 110);
        node.loadFromFile(file);
      });

      (function loadOpenCV() {
        var s = document.createElement("script");
        s.src = "https://docs.opencv.org/4.10.0/opencv.js";
        s.async = true;
        document.head.appendChild(s);
      })();
    })();
  </script>
</body>
</html>
