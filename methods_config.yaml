# Configuration for ASCII art conversion methods.
# percentile is NOT set here — it is read from each image's sidecar .json file.

methods:
  - name: "greedy_iou_extended"
    method: "greedy_iou"
    scale: 0.5
    misc_args:
      char_set: "extended"
      char_width: 8
      char_height: 16

  - name: "greedy_iou_minimal"
    method: "greedy_iou"
    scale: 0.5
    misc_args:
      char_set: "minimal"
      char_width: 8
      char_height: 16

  - name: "greedy_iou_standard"
    method: "greedy_iou"
    scale: 0.5
    misc_args:
      char_set: "standard"
      char_width: 8
      char_height: 16

  - name: "greedy_iou_all"
    method: "greedy_iou"
    scale: 0.5
    misc_args:
      char_set: "all"
      char_width: 8
      char_height: 16
