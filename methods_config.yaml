  - name: "greedy_iou_insta"
    method: "greedy_iou"
    scale: 0.5
    misc_args:
      char_set: "insta"
      char_width: 8
      char_height: 16

  - name: "greedy_iou_insta_bw2"
    method: "greedy_iou_white_weighted"
    scale: 0.5
    misc_args:
      char_set: "insta"
      char_width: 8
      char_height: 16
      white_weight: 2

  - name: "greedy_iou_insta_ww3"
    method: "greedy_iou_white_weighted"
    scale: 0.5
    misc_args:
      char_set: "insta"
      char_width: 8
      char_height: 16
      white_weight: 3

  - name: "greedy_iou_insta_ww4"
    method: "greedy_iou_white_weighted"
    scale: 0.5
    misc_args:
      char_set: "insta"
      char_width: 8
      char_height: 16
      white_weight: 4

  - name: "greedy_iou_insta_ww5"
    method: "greedy_iou_white_weighted"
    scale: 0.5
    misc_args:
      char_set: "insta"
      char_width: 8
      char_height: 16
      white_weight: 5
